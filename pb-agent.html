<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PB Agent" />
  <meta name="theme-color" content="#0a0c10" />
  <title>Pandoras Box Agent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --orange: #ff6b00;
      --orange-light: #ff9500;
      --bg: #0a0c10;
      --bg2: #0d1117;
      --bg3: #0f1419;
      --bg4: #1a1f2e;
      --border: #1e293b;
      --border2: #334155;
      --text: #e2e8f0;
      --text-muted: #64748b;
      --text-dim: #94a3b8;
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body {
      height: 100%; height: -webkit-fill-available;
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Mono', 'Courier New', monospace;
      overflow: hidden;
    }
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: -webkit-fill-available;
    }

    /* HEADER */
    #header {
      background: linear-gradient(135deg, var(--bg3) 0%, var(--bg4) 100%);
      border-bottom: 1px solid var(--orange);
      padding: 12px 16px;
      padding-top: calc(12px + var(--safe-top));
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 20px rgba(255,107,0,0.15);
      flex-shrink: 0;
    }
    #logo {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--orange), var(--orange-light));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 700; color: #000;
      box-shadow: 0 0 16px rgba(255,107,0,0.4);
      flex-shrink: 0;
      letter-spacing: -0.5px;
    }
    #header-titles { flex: 1; }
    #header-titles h1 { font-size: 13px; font-weight: 700; color: var(--orange); letter-spacing: 0.08em; }
    #header-titles p { font-size: 10px; color: var(--text-muted); letter-spacing: 0.08em; margin-top: 1px; }
    #toggle-wrap { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    #toggle-label { font-size: 10px; color: var(--text-muted); }
    #toggle {
      width: 36px; height: 20px;
      background: var(--border2);
      border-radius: 10px;
      position: relative;
      cursor: pointer;
      border: 1px solid var(--border2);
      transition: background 0.2s;
      flex-shrink: 0;
    }
    #toggle.on { background: var(--orange); border-color: var(--orange-light); }
    #toggle-knob {
      width: 14px; height: 14px;
      background: #fff;
      border-radius: 50%;
      position: absolute;
      top: 2px; left: 2px;
      transition: left 0.2s;
    }
    #toggle.on #toggle-knob { left: 18px; }

    /* QUICK ACTIONS */
    #quick {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 6px;
      overflow-x: auto;
      background: var(--bg2);
      flex-shrink: 0;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    #quick::-webkit-scrollbar { display: none; }
    .qa-btn {
      background: var(--bg4);
      border: 1px solid var(--border2);
      border-radius: 6px;
      padding: 6px 10px;
      color: var(--text-dim);
      font-size: 11px;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      display: flex; align-items: center; gap: 5px;
      flex-shrink: 0;
      transition: all 0.15s;
      -webkit-user-select: none;
    }
    .qa-btn:active { background: var(--orange); color: #000; border-color: var(--orange); }

    /* MESSAGES */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      -webkit-overflow-scrolling: touch;
    }
    .msg-wrap { display: flex; }
    .msg-wrap.user { justify-content: flex-end; }
    .msg-wrap.assistant { justify-content: flex-start; }
    .msg-bubble {
      max-width: 88%;
      padding: 10px 14px;
      font-size: 13px;
      line-height: 1.6;
      border-radius: 14px;
    }
    .msg-bubble.user {
      background: linear-gradient(135deg, var(--orange), var(--orange-light));
      color: #000;
      border-radius: 14px 14px 4px 14px;
      font-weight: 500;
    }
    .msg-bubble.assistant {
      background: var(--bg3);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 14px 14px 14px 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .msg-bubble.assistant code {
      background: var(--border);
      padding: 1px 5px;
      border-radius: 4px;
      color: var(--orange-light);
      font-size: 12px;
      font-family: inherit;
    }
    .msg-bubble.assistant pre {
      background: var(--border);
      border: 1px solid var(--border2);
      border-radius: 6px;
      padding: 10px;
      overflow-x: auto;
      margin: 6px 0;
      font-size: 11px;
    }
    .msg-bubble.assistant pre code { background: none; padding: 0; color: #7dd3a8; }
    .msg-bubble.assistant strong { color: var(--orange-light); }
    .msg-bubble.assistant h2, .msg-bubble.assistant h3, .msg-bubble.assistant h4 {
      color: var(--orange); margin: 8px 0 4px 0; font-size: 13px;
    }
    .msg-bubble.assistant ul { padding-left: 18px; margin: 4px 0; }
    .msg-bubble.assistant li { margin: 2px 0; }
    .msg-bubble.assistant p { margin: 4px 0; }

    /* TYPING */
    .typing-bubble {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 14px 14px 14px 4px;
      padding: 12px 18px;
      display: flex; gap: 5px; align-items: center;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--orange);
      animation: pulse 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%,80%,100% { transform: scale(0.7); opacity: 0.4; }
      40% { transform: scale(1.2); opacity: 1; }
    }

    /* INPUT */
    #input-area {
      padding: 10px 12px;
      padding-bottom: calc(10px + var(--safe-bottom));
      border-top: 1px solid var(--border);
      background: var(--bg2);
      display: flex;
      gap: 8px;
      align-items: flex-end;
      flex-shrink: 0;
    }
    #msg-input {
      flex: 1;
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: 10px 12px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      line-height: 1.4;
      max-height: 100px;
      transition: border-color 0.15s;
      -webkit-appearance: none;
    }
    #msg-input:focus { border-color: var(--orange); }
    #msg-input::placeholder { color: var(--text-muted); }
    #send-btn {
      background: linear-gradient(135deg, var(--orange), var(--orange-light));
      border: none;
      border-radius: 10px;
      width: 44px; height: 44px;
      color: #000;
      font-size: 18px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.15s;
      -webkit-user-select: none;
    }
    #send-btn:disabled { opacity: 0.3; }
    #send-btn:active { opacity: 0.7; }

    /* scrollbar */
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  </style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="logo">PB</div>
    <div id="header-titles">
      <h1>PANDORAS BOX AGENT</h1>
      <p>twoloox · Pandoras Box · Widget Designer</p>
    </div>
    <div id="toggle-wrap">
      <span id="toggle-label">Web</span>
      <div id="toggle" class="on" onclick="toggleSearch()">
        <div id="toggle-knob"></div>
      </div>
    </div>
  </div>

  <div id="quick"></div>

  <div id="messages"></div>

  <div id="input-area">
    <textarea id="msg-input" rows="1" placeholder="Frage zu PB oder Widget Designer…"></textarea>
    <button id="send-btn" onclick="sendMessage()" disabled>➤</button>
  </div>
</div>

<script>
const SYSTEM = `Du bist ein hochspezialisierter KI-Assistent für twoloox Pandoras Box und Widget Designer. Du kennst das gesamte Produktportfolio von twoloox (vormals Christie Digital) und hilfst professionellen AV/Show-Technikern bei:

1. Pandoras Box Projekte anlegen & konfigurieren
   - Projektstruktur, Devices, Layers, Sequences, Site-Konzept
   - Media-Management, Folder/File IDs, CITP-Thumbnails
   - DMX-Tabellen, Parameter-Listen
   - Netzwerkkonfiguration (TCP Port 6211, UDP Port 6212)
   - Redundanz/Backup-Setup mit zwei PB Manager Systemen

2. Widget Designer programmieren
   - Buttons, Fader, Encoder, Custom Script Buttons
   - Script-Syntax und über 1000 verfügbare Commands
   - Connection Manager, Art-Net, OSC, MIDI, DMX
   - Nodes & Object/Member Notation
   - PB Network Configuration, TCP/UDP-Verbindungen (Port 6213 für WD-Device)
   - Media Control, Cue Control, Image Loader
   - Script Timer, Art-Net Recorder/Snapshot
   - Seiten (Pages), Run-Mode (F8), Edit-Mode (F9)

3. Integration & Workflows
   - PB ↔ WD Kommunikation
   - Layer Picking, Touch/Mouse Input
   - FX Parameter Syntax: "FX-Name|Parameter" z.B. "RGB Multiply|Blue"
   - Projection Mapping, 4K/UHD Playback
   - Tracking Solutions, AirScan

4. Troubleshooting & Best Practices
   - Netzwerkprobleme diagnostizieren
   - Performance-Optimierung (Throttle-Parameter etc.)
   - Version-Kompatibilität: WD V6 → PB V5/V6; ältere PB Versionen → WD V4.7 oder niedriger
   - Domain-Einstellungen (Standard: Domain 0)

Offizielle Dokumentation: https://pandorasboxhelpfile.com/home/index.html

Antworte immer auf Deutsch, präzise und praxisorientiert. Bei Widget Designer Scripts nutze korrekte WD-Script-Syntax. Gib konkrete Schritte an (z.B. "Rechtsklick → Properties → ..."). Verweise auf relevante Helpfile-Seiten wenn sinnvoll. Halte Antworten übersichtlich und strukturiert.`;

const QUICK = [
  { icon: "🎬", label: "Neues PB Projekt", q: "Wie lege ich ein neues Pandoras Box Projekt an? Schritt für Schritt bitte." },
  { icon: "🔌", label: "WD verbinden", q: "Wie verbinde ich Widget Designer mit Pandoras Box über das Netzwerk? TCP oder UDP?" },
  { icon: "📝", label: "Script Button", q: "Wie erstelle ich einen Custom Script Button im Widget Designer? Zeig mir ein Beispiel." },
  { icon: "💡", label: "DMX Mapping", q: "Wie funktioniert DMX-Steuerung in Pandoras Box? Erkläre die Tabellen und Parameter." },
  { icon: "🎛️", label: "Encoder Widget", q: "Wie konfiguriere ich einen Encoder im Widget Designer um PB-Parameter zu steuern?" },
  { icon: "🌐", label: "Art-Net Setup", q: "Wie richte ich Art-Net im Widget Designer ein? Was muss ich beachten?" },
  { icon: "📐", label: "Proj. Mapping", q: "Wie starte ich mit Projection Mapping in Pandoras Box? Was brauche ich?" },
  { icon: "🔁", label: "Backup System", q: "Wie konfiguriere ich ein redundantes Backup-System mit zwei PB Manager Systemen?" },
];

let history = [];
let webSearch = true;
let loading = false;

// Build quick actions
const quickDiv = document.getElementById('quick');
QUICK.forEach(a => {
  const btn = document.createElement('button');
  btn.className = 'qa-btn';
  btn.innerHTML = `<span>${a.icon}</span><span>${a.label}</span>`;
  btn.onclick = () => sendMessage(a.q);
  quickDiv.appendChild(btn);
});

// Initial message
addMessage('assistant', 'Willkommen! Ich bin dein spezialisierter Assistent für **twoloox Pandoras Box** und **Widget Designer**.\n\nIch helfe dir bei:\n- 🎬 PB Projekte anlegen & konfigurieren\n- 📝 Widget Designer Scripts & Programmierung\n- 🔌 Netzwerk-Integration & Verbindungen\n- 💡 DMX, Art-Net, OSC Control\n- 🔧 Troubleshooting & Best Practices\n\nNutze die Schnellzugriffe oder stelle deine Frage!');

// Input
const input = document.getElementById('msg-input');
const sendBtn = document.getElementById('send-btn');

input.addEventListener('input', () => {
  sendBtn.disabled = !input.value.trim() || loading;
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 100) + 'px';
});

input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!sendBtn.disabled) sendMessage();
  }
});

function toggleSearch() {
  webSearch = !webSearch;
  const t = document.getElementById('toggle');
  webSearch ? t.classList.add('on') : t.classList.remove('on');
}

function md(text) {
  return text
    .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
    .replace(/`([^`\n]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*\n]+)\*/g, '<em>$1</em>')
    .replace(/^###\s(.+)$/gm, '<h4>$1</h4>')
    .replace(/^##\s(.+)$/gm, '<h3>$1</h3>')
    .replace(/^#\s(.+)$/gm, '<h2>$1</h2>')
    .replace(/^[-•]\s(.+)$/gm, '<li>$1</li>')
    .replace(/(<li>[\s\S]*?<\/li>)(\n<li>|$)/g, (m) => m)
    .replace(/(<li>.*<\/li>\n?)+/gs, s => '<ul>' + s + '</ul>')
    .replace(/\n\n+/g, '</p><p>')
    .replace(/\n/g, '<br/>');
}

function addMessage(role, text) {
  const msgs = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.className = `msg-wrap ${role}`;
  const bubble = document.createElement('div');
  bubble.className = `msg-bubble ${role}`;
  if (role === 'assistant') {
    bubble.innerHTML = '<p>' + md(text) + '</p>';
  } else {
    bubble.textContent = text;
  }
  wrap.appendChild(bubble);
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
  return wrap;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap assistant';
  wrap.id = 'typing';
  wrap.innerHTML = '<div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

async function sendMessage(text) {
  const userText = text || input.value.trim();
  if (!userText || loading) return;

  input.value = '';
  input.style.height = 'auto';
  sendBtn.disabled = true;
  loading = true;

  addMessage('user', userText);
  history.push({ role: 'user', content: userText });
  showTyping();

  try {
    const body = {
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      system: SYSTEM,
      messages: history,
    };
    if (webSearch) {
      body.tools = [{ type: 'web_search_20250305', name: 'web_search' }];
    }

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });

    const data = await res.json();
    const reply = (data.content || [])
      .filter(b => b.type === 'text')
      .map(b => b.text)
      .join('\n') || 'Keine Antwort erhalten.';

    history.push({ role: 'assistant', content: reply });
    removeTyping();
    addMessage('assistant', reply);
  } catch (err) {
    removeTyping();
    addMessage('assistant', '⚠️ Verbindungsfehler. Bitte erneut versuchen.');
  }

  loading = false;
  sendBtn.disabled = !input.value.trim();
}
</script>
</body>
</html>
